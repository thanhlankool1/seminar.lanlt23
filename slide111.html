<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Cảm ơn & Hỏi Đáp</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&amp;family=Open+Sans:wght@400;600&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Open Sans', sans-serif;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            display: flex;
            position: relative;
            background-color: #1e293b;
            color: white;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform-origin: center center;
        }

        /* Gradient Simulation - Matching Cover Slide Theme */
        .bg-shape-1 {
            position: absolute;
            top: -250px;
            left: -200px;
            width: 1000px;
            height: 1000px;
            background-color: #1e3a8a;
            /* Blue 900 */
            border-radius: 50%;
            opacity: 0.6;
            z-index: 0;
            filter: blur(100px);
        }

        .bg-shape-2 {
            position: absolute;
            bottom: -300px;
            right: -200px;
            width: 1100px;
            height: 1100px;
            background-color: #0ea5e9;
            /* Sky 500 */
            border-radius: 50%;
            opacity: 0.4;
            z-index: 0;
            filter: blur(120px);
        }

        .bg-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.3;
            z-index: 1;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 0 100px;
            text-align: center;
        }

        /* Typography Styling */
        .main-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 100px;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: -2px;
            margin-bottom: 20px;
            text-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            background-color: #ffffff;
            /* Fallback for gradient text */
            -webkit-background-clip: text;
            /* No gradient text allowed per instructions, using solid white */
            color: white;
        }

        .subtitle {
            font-family: 'Open Sans', sans-serif;
            font-weight: 600;
            font-size: 32px;
            color: #fbbf24;
            /* Amber 400 */
            margin-bottom: 60px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Contact Box Styling */
        .contact-box {
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 30px 60px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 600px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            margin: 10px 0;
            font-size: 20px;
            color: #e2e8f0;
            /* Slate 200 */
        }

        .social-icons {
            display: flex;
            gap: 30px;
            margin-top: 30px;
        }

        .social-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            color: white;
            transition: transform 0.3s, background-color 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Decoration Elements */
        .deco-line {
            width: 100px;
            height: 6px;
            background-color: #fbbf24;
            /* Amber 400 */
            margin-bottom: 40px;
            border-radius: 3px;
        }

        .floating-icon {
            position: absolute;
            opacity: 0.15;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <!-- Background Elements -->
        <div class="bg-shape-1"></div>
        <div class="bg-shape-2"></div>
        <div class="bg-grid"></div>
        <!-- Floating Icons Decoration -->
        <div class="floating-icon text-white text-9xl" style="top: 15%; left: 10%; transform: rotate(-15deg);">
            <i class="fab fa-python"></i>
        </div>
        <div class="floating-icon text-white text-9xl" style="bottom: 15%; right: 10%; transform: rotate(15deg);">
            <i class="fab fa-golang"></i>
        </div>
        <div class="floating-icon text-white text-6xl" style="top: 20%; right: 20%; transform: rotate(25deg);">
            <i class="fas fa-rocket"></i>
        </div>
        <div class="floating-icon text-white text-6xl" style="bottom: 25%; left: 20%; transform: rotate(-10deg);">
            <i class="fas fa-comments"></i>
        </div>
        <!-- Main Content -->
        <div class="content-wrapper">
            <h1 class="main-title">Chân thành cám ơn!</h1>
            <div class="deco-line"></div>
            <div class="subtitle">
                <p>Hỏi Đáp</p>
            </div>
            <div class="contact-box">
                <div class="contact-item">
                    <p><i class="fas fa-envelope mr-3 text-sky-400"></i> contact@example.com</p>
                </div>
                <div class="contact-item">
                    <p><i class="fas fa-globe mr-3 text-sky-400"></i> www.yourcompany.com</p>
                </div>
                <div class="social-icons">
                    <div class="social-icon">
                        <i class="fab fa-github"></i>
                    </div>
                    <div class="social-icon">
                        <i class="fab fa-linkedin-in"></i>
                    </div>
                    <div class="social-icon">
                        <i class="fab fa-twitter"></i>
                    </div>
                    <div class="social-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                </div>
            </div>
            <div class="mt-12 opacity-60 text-sm font-open-sans">
                <p>© 2024 Chuyển đổi Python sang Go Seminar. All rights reserved.</p>
            </div>
        </div>
    </div>

    <!-- Navigation script and styling added automatically -->
    <style>
        .nav-buttons {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }
        .nav-btn {
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            color: inherit;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-btn i {
            font-size: 14px;
        }
        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        /* Handle light background slides by darkening buttons slightly */
        .content-wrapper > .text-white, body[style*="f1f5f9"] .nav-btn, body[style*="f8fafc"] .nav-btn, .bg-slate-50 .nav-btn {
            background-color: rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.2);
            color: #1e293b;
        }
        .content-wrapper > .text-white:hover, body[style*="f1f5f9"] .nav-btn:hover, body[style*="f8fafc"] .nav-btn:hover, .bg-slate-50 .nav-btn:hover {
            background-color: rgba(0, 0, 0, 0.2);
        }
    </style>
    <div class="nav-buttons">
        <button id="prevBtn" class="nav-btn"><i class="fas fa-chevron-left"></i> Trước</button>
        <button id="nextBtn" class="nav-btn">Tiếp <i class="fas fa-chevron-right"></i></button>
    </div>
    <script>
        const slides = ["index.html", "slide1.html", "slide2.html", "slide3.html", "slide4.html", "slide5.html", "slide6.html", "slide7.html", "slide8.html", "slide9.html", "slide10.html", "slide12.html", "slide13.html", "slide14.html", "slide15.html"];
        let currentFile = window.location.pathname.split('/').pop();
        if(!currentFile) currentFile = "index.html";
        let currentIndex = slides.indexOf(currentFile);
        
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        
        if(currentIndex <= 0) prevBtn.disabled = true;
        if(currentIndex >= slides.length - 1 || currentIndex === -1) nextBtn.disabled = true;
        
        prevBtn.addEventListener("click", () => {
            if(currentIndex > 0) window.location.href = slides[currentIndex - 1];
        });
        
        nextBtn.addEventListener("click", () => {
            if(currentIndex > -1 && currentIndex < slides.length - 1) window.location.href = slides[currentIndex + 1];
        });
        
        document.addEventListener("keydown", (e) => {
            if(e.key === "ArrowLeft" && currentIndex > 0) {
                window.location.href = slides[currentIndex - 1];
            } else if (e.key === "ArrowRight" && currentIndex > -1 && currentIndex < slides.length - 1) {
                window.location.href = slides[currentIndex + 1];
            }
        });
    
        function resizeSlide() {
            const container = document.querySelector('.slide-container');
            if (container) {
                const scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
                container.style.transform = `scale(${scale})`;
            }
        }
        window.addEventListener('resize', resizeSlide);
        resizeSlide();
</script>
</body>

</html>
