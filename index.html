<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Tiếp cận Golang bằng AI</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700;900&amp;family=Open+Sans:wght@400;600&amp;family=Fira+Code:wght@400&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Open Sans', sans-serif;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            display: flex;
            position: relative;
            background-color: #1e293b;
            color: white;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform-origin: center center;
        }

        /* Design Elements - Geometric Shapes to create depth without CSS Gradients */
        .shape-bg-1 {
            position: absolute;
            top: -150px;
            right: -100px;
            width: 800px;
            height: 800px;
            background-color: #1e3a8a;
            /* Blue 900 */
            border-radius: 50%;
            opacity: 0.6;
            z-index: 0;
        }

        .shape-bg-2 {
            position: absolute;
            bottom: -200px;
            left: -100px;
            width: 600px;
            height: 600px;
            background-color: #1d4ed8;
            /* Blue 700 */
            border-radius: 50%;
            opacity: 0.2;
            z-index: 0;
        }

        .shape-bg-3 {
            position: absolute;
            top: 20%;
            left: 15%;
            width: 100px;
            height: 100px;
            border: 4px solid #3b82f6;
            /* Blue 500 */
            border-radius: 50%;
            opacity: 0.1;
            z-index: 0;
        }

        .shape-bg-4 {
            position: absolute;
            bottom: 20%;
            right: 15%;
            width: 150px;
            height: 150px;
            border: 4px solid #facc15;
            /* Yellow 400 */
            border-radius: 20%;
            transform: rotate(45deg);
            opacity: 0.1;
            z-index: 0;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .title-text {
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <!-- Background Decorations -->
        <div class="shape-bg-1"></div>
        <div class="shape-bg-2"></div>
        <div class="shape-bg-3"></div>
        <div class="shape-bg-4"></div>
        <!-- Main Content -->
        <div class="content-wrapper">
            <!-- Logos / Icons -->
            <div class="flex items-center space-x-10 mb-8 transform scale-110">
                <div class="flex flex-col items-center">
                    <p class="text-6xl text-yellow-400 mb-0">
                        <i class="fab fa-python"></i>
                    </p>
                </div>
                <div class="flex items-center text-slate-400 space-x-1">
                    <p class="text-2xl opacity-50"><i class="fas fa-chevron-right"></i></p>
                    <p class="text-2xl opacity-75"><i class="fas fa-chevron-right"></i></p>
                    <p class="text-2xl opacity-100"><i class="fas fa-chevron-right"></i></p>
                </div>
                <div class="flex flex-col items-center">
                    <p class="text-7xl text-blue-400 mb-0">
                        <i class="fab fa-golang"></i>
                    </p>
                </div>
            </div>
            <!-- Main Title -->
            <div class="text-center mb-6 z-10">
                <h1 class="font-montserrat font-black text-7xl mb-2 tracking-tight text-white leading-tight title-text">
                    <p class="mb-0">Tiếp cận Golang bằng AI</p>
                </h1>
            </div>
            <!-- Decorative Line -->
            <div class="w-32 h-1.5 bg-yellow-500 rounded-full mb-8 shadow-lg"></div>
            <!-- Subtitle -->
            <div class="text-center px-12 z-10">
                <p class="font-open-sans text-3xl font-light text-gray-200 tracking-wide leading-relaxed">
                    Bài Toán: Capture Traffic &amp; Clickhouse
                </p>
            </div>
            <!-- Technical Tags Footer -->
            <div
                class="absolute bottom-10 w-full flex justify-center items-center space-x-8 text-sm text-gray-400 font-mono tracking-widest uppercase">
                <div
                    class="flex items-center px-4 py-2 bg-black bg-opacity-20 rounded-lg backdrop-filter backdrop-blur-sm border border-gray-700">
                    <p class="mb-0"><i class="fas fa-bolt text-yellow-500 mr-3"></i>Thông lượng cao</p>
                </div>
                <div
                    class="flex items-center px-4 py-2 bg-black bg-opacity-20 rounded-lg backdrop-filter backdrop-blur-sm border border-gray-700">
                    <p class="mb-0"><i class="fas fa-server text-blue-400 mr-3"></i>Kiến trúc Microservices</p>
                </div>
                <div
                    class="flex items-center px-4 py-2 bg-black bg-opacity-20 rounded-lg backdrop-filter backdrop-blur-sm border border-gray-700">
                    <p class="mb-0"><i class="fas fa-chart-line text-green-400 mr-3"></i>ClickHouse</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation script and styling added automatically -->
    <style>
        .nav-buttons {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            color: inherit;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn i {
            font-size: 14px;
        }

        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Handle light background slides by darkening buttons slightly */
        .content-wrapper>.text-white,
        body[style*="f1f5f9"] .nav-btn,
        body[style*="f8fafc"] .nav-btn,
        .bg-slate-50 .nav-btn {
            background-color: rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.2);
            color: #1e293b;
        }

        .content-wrapper>.text-white:hover,
        body[style*="f1f5f9"] .nav-btn:hover,
        body[style*="f8fafc"] .nav-btn:hover,
        .bg-slate-50 .nav-btn:hover {
            background-color: rgba(0, 0, 0, 0.2);
        }
    </style>
    <div class="nav-buttons">
        <button id="prevBtn" class="nav-btn"><i class="fas fa-chevron-left"></i> Trước</button>
        <button id="nextBtn" class="nav-btn">Tiếp <i class="fas fa-chevron-right"></i></button>
    </div>
    <script>
        const slides = ["index.html", "slide1.html", "slide2.html", "slide3.html", "slide4.html", "slide5.html", "slide6.html", "slide7.html", "slide8.html", "slide9.html", "slide10.html", "slide12.html", "slide13.html", "slide14.html", "slide15.html"];
        let currentFile = window.location.pathname.split('/').pop();
        if (!currentFile) currentFile = "index.html";
        let currentIndex = slides.indexOf(currentFile);

        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");

        if (currentIndex <= 0) prevBtn.disabled = true;
        if (currentIndex >= slides.length - 1 || currentIndex === -1) nextBtn.disabled = true;

        prevBtn.addEventListener("click", () => {
            if (currentIndex > 0) window.location.href = slides[currentIndex - 1];
        });

        nextBtn.addEventListener("click", () => {
            if (currentIndex > -1 && currentIndex < slides.length - 1) window.location.href = slides[currentIndex + 1];
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft" && currentIndex > 0) {
                window.location.href = slides[currentIndex - 1];
            } else if (e.key === "ArrowRight" && currentIndex > -1 && currentIndex < slides.length - 1) {
                window.location.href = slides[currentIndex + 1];
            }
        });
    
        function resizeSlide() {
            const container = document.querySelector('.slide-container');
            if (container) {
                const scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
                container.style.transform = `scale(${scale})`;
            }
        }
        window.addEventListener('resize', resizeSlide);
        resizeSlide();
</script>
</body>

</html>
