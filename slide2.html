<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Hạn chế</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&amp;family=Open+Sans:wght@400;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Open Sans', sans-serif;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            display: flex;
            position: relative;
            background-color: #1e293b;
            color: white;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform-origin: center center;
        }

        /* Simulated Gradient via Shapes */
        .bg-shape-1 {
            position: absolute;
            top: -200px;
            left: -200px;
            width: 900px;
            height: 900px;
            background-color: #3730a3;
            /* Indigo 800 */
            border-radius: 50%;
            opacity: 0.35;
            z-index: 0;
            filter: blur(100px);
        }

        .bg-shape-2 {
            position: absolute;
            bottom: -100px;
            right: -100px;
            width: 800px;
            height: 800px;
            background-color: #1e3a5f;
            /* Dark Blue */
            border-radius: 50%;
            opacity: 0.5;
            z-index: 0;
            filter: blur(80px);
        }

        .bg-grid {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.2;
            z-index: 1;
        }

        /* Watermark Icon */
        .watermark-icon {
            position: absolute;
            right: 50px;
            bottom: -50px;
            font-size: 400px;
            color: #000000;
            opacity: 0.1;
            transform: rotate(-15deg);
            z-index: 1;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 56px 100px 124px;
            z-index: 10;
        }

        /* Glassmorphism Card Style */
        .alert-card {
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            border-left: 10px solid #818cf8;
            /* Indigo 400 */
            padding: 30px 40px;
            margin-bottom: 22px;
            display: flex;
            align-items: center;
            transition: transform 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .alert-card:last-child {
            margin-bottom: 0;
        }

        .alert-card.critical {
            background-color: rgba(79, 70, 229, 0.15);
            /* Indigo tint */
            border-left: 10px solid #a78bfa;
            /* Violet 400 */
            border: 1px solid rgba(167, 139, 250, 0.25);
            border-left-width: 10px;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: rgba(255, 255, 255, 0.15);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 30px;
            flex-shrink: 0;
        }
    </style>
    <link rel="stylesheet" href="statics/nav-uniform.css">
</head>

<body>
    <div class="slide-container">
        <!-- Background Elements -->
        <div class="bg-shape-1"></div>
        <div class="bg-shape-2"></div>
        <div class="bg-grid"></div>
        <div class="watermark-icon">
            <i class="fas fa-exclamation-circle"></i>
        </div>
        <!-- Main Content -->
        <div class="content-wrapper">
            <!-- Header -->
            <div class="mb-12 border-b border-white border-opacity-20 pb-6 flex items-center justify-between">
                <div>
                    <h1
                        class="font-montserrat font-black text-6xl text-white tracking-tight mb-2 uppercase drop-shadow-lg">
                        Hạn chế và rủi ro
                    </h1>
                    <p class="font-open-sans text-xl text-indigo-300 font-semibold tracking-wide">
                        <i class="fas fa-brain mr-2"></i>Critical Constraints &amp; Rủi ro
                    </p>
                </div>
                <div class="text-6xl text-indigo-400 opacity-80">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
            </div>
            <!-- List Points -->
            <div class="flex flex-col justify-start flex-grow">
                <!-- Point 1 -->
                <div class="alert-card">
                    <div class="icon-container">
                        <i class="fas fa-pencil-ruler text-4xl text-indigo-300"></i>
                    </div>
                    <div>
                        <p class="font-montserrat font-bold text-3xl mb-1">Không tốt design</p>
                        <p class="font-open-sans text-lg text-gray-200 opacity-90"></p>
                    </div>
                </div>
                <!-- Point 2 -->
                <div class="alert-card">
                    <div class="icon-container">
                        <i class="fas fa-tachometer-alt-fast text-4xl text-blue-300"></i>
                    </div>
                    <div>
                        <p class="font-montserrat font-bold text-3xl mb-1">Phụ thuộc AI</p>
                        <p class="font-open-sans text-lg text-gray-200 opacity-90"></p>
                    </div>
                </div>
                <!-- Point 3 (Critical) -->
                <div class="alert-card critical">
                    <div class="icon-container" style="background-color: rgba(139, 92, 246, 0.2);">
                        <div class="relative">
                            <i class="fas fa-graduation-cap text-4xl text-violet-300"></i>
                            <i
                                class="fas fa-exclamation absolute -top-3 -right-3 text-violet-400 text-2xl bg-slate-800 rounded-full border-2 border-slate-700 w-8 h-8 flex items-center justify-center"></i>
                        </div>
                    </div>
                    <div>
                        <p class="font-montserrat font-bold text-3xl mb-1 text-violet-200">Cần hiểu bản chất</p>
                        <p class="font-open-sans text-lg text-slate-300 opacity-90">Phải hiểu nguyên nhân, bản chất để
                            khắc phục sai lầm của AI</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation script and styling added automatically -->
    <style>
        .nav-buttons {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            color: inherit;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn i {
            font-size: 14px;
        }

        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Handle light background slides by darkening buttons slightly */
        .content-wrapper>.text-white,
        body[style*="f1f5f9"] .nav-btn,
        body[style*="f8fafc"] .nav-btn,
        .bg-slate-50 .nav-btn {
            background-color: rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.2);
            color: #1e293b;
        }

        .content-wrapper>.text-white:hover,
        body[style*="f1f5f9"] .nav-btn:hover,
        body[style*="f8fafc"] .nav-btn:hover,
        .bg-slate-50 .nav-btn:hover {
            background-color: rgba(0, 0, 0, 0.2);
        }
    </style>
    <div class="nav-buttons">
        <button id="prevBtn" class="nav-btn"><i class="fas fa-chevron-left"></i> Trước</button>
        <button id="nextBtn" class="nav-btn">Tiếp <i class="fas fa-chevron-right"></i></button>
    </div>
    <script>
        const slides = ["index.html", "slide1.html", "slide2.html", "slide3.html", "slide4.html", "slide5.html", "slide6.html", "slide7.html", "slide8.html", "slide9.html", "slide10.html", "slide12.html", "slide13.html", "slide14.html", "slide15.html"];
        let currentFile = window.location.pathname.split('/').pop();
        if (!currentFile) currentFile = "index.html";
        let currentIndex = slides.indexOf(currentFile);

        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");

        if (currentIndex <= 0) prevBtn.disabled = true;
        if (currentIndex >= slides.length - 1 || currentIndex === -1) nextBtn.disabled = true;

        prevBtn.addEventListener("click", () => {
            if (currentIndex > 0) window.location.href = slides[currentIndex - 1];
        });

        nextBtn.addEventListener("click", () => {
            if (currentIndex > -1 && currentIndex < slides.length - 1) window.location.href = slides[currentIndex + 1];
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft" && currentIndex > 0) {
                window.location.href = slides[currentIndex - 1];
            } else if (e.key === "ArrowRight" && currentIndex > -1 && currentIndex < slides.length - 1) {
                window.location.href = slides[currentIndex + 1];
            }
        });

        function resizeSlide() {
            const container = document.querySelector('.slide-container');
            if (container) {
                const scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
                container.style.transform = `scale(${scale})`;
            }
        }
        window.addEventListener('resize', resizeSlide);
        resizeSlide();
    </script>
    <script src="statics/nav-uniform.js"></script>
</body>

</html>
