<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Ví dụ: Concept Mapping</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Open+Sans:wght@400;600&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Open Sans', sans-serif;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            display: flex;
            position: relative;
            background-color: #1e293b;
            color: white;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform-origin: center center;
            flex-direction: column;
        }

        /* Decorative Background Shapes */
        .bg-shape-1 {
            position: absolute;
            top: -200px;
            right: -200px;
            width: 800px;
            height: 800px;
            background-color: #065f46;
            /* Emerald/Teal 800 */
            filter: blur(100px);
            border-radius: 50%;
            opacity: 0.2;
            z-index: 0;
        }

        .bg-shape-2 {
            position: absolute;
            bottom: -150px;
            left: -150px;
            width: 600px;
            height: 600px;
            background-color: #1e3a8a;
            /* Blue 900 */
            filter: blur(100px);
            border-radius: 50%;
            opacity: 0.3;
            z-index: 0;
        }

        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 50px 80px;
            z-index: 10;
            height: 100%;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .image-gallery {
            display: flex;
            gap: 25px;
            justify-content: space-between;
            flex: 1;
            align-items: stretch;
            padding-bottom: 10px;
        }

        .image-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .image-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(52, 211, 153, 0.4);
            /* Emerald 400 fade */
        }

        .card-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 15px;
            color: #f8fafc;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 14px;
            background: rgba(52, 211, 153, 0.15);
            /* Emerald background */
            border-radius: 8px;
            border: 1px solid rgba(52, 211, 153, 0.3);
            width: fit-content;
        }

        .card-title i {
            color: #34d399;
            /* Emerald 400 */
        }

        .image-container {
            flex: 1;
            border-radius: 8px;
            overflow: hidden;
            background: #111827;
            /* Very dark background to blend code snippets */
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #374151;
            /* Slate 700 */
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
            padding: 5px;
            /* Slight padding to frame the code */
        }

        .image-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 4px;
        }

        /* Nav buttons */
        .nav-buttons {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            color: inherit;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Lightbox Modal */
        .lightbox-modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .lightbox-modal.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .lightbox-modal.active .lightbox-content {
            transform: scale(1);
        }

        .lightbox-image {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(52, 211, 153, 0.5);
        }

        .lightbox-close {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 30px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .lightbox-close:hover {
            color: #34d399;
            /* Emerald 400 */
        }

        /* Add pointer to images */
        .image-container img {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .image-container img:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }
    </style>
</head>

<body>
    <div class="slide-container">
        <!-- Background Elements -->
        <div class="bg-shape-1"></div>
        <div class="bg-shape-2"></div>

        <!-- Main Content -->
        <div class="content-wrapper">
            <div class="header-section">
                <div>
                    <h1
                        class="font-montserrat font-black text-6xl text-white tracking-tight mb-2 uppercase drop-shadow-md">
                        Học theo Concept Mapping
                    </h1>
                    <p class="font-open-sans text-xl text-emerald-300 font-semibold tracking-wide">
                        Ánh xạ tư duy thiết kế từ Python sang Go
                    </p>
                </div>
                <div class="text-emerald-400 text-5xl opacity-80 pb-2">
                    <i class="fas fa-code-compare"></i>
                </div>
            </div>

            <!-- 3 Image Gallery Cards -->
            <div class="image-gallery">
                <!-- Card 1 -->
                <div class="image-card">
                    <div class="card-title">
                        <i class="fas fa-box"></i>
                        <span>1. Package / Module</span>
                    </div>
                    <div class="image-container">
                        <img src="statics/vidu1.png" alt="Ví dụ Package" />
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="image-card">
                    <div class="card-title">
                        <i class="fas fa-cube"></i>
                        <span>2. Class vs Struct</span>
                    </div>
                    <div class="image-container">
                        <img src="statics/vidu2.png" alt="Ví dụ Struct" />
                    </div>
                </div>

                <!-- Card 3 -->
                <div class="image-card">
                    <div class="card-title">
                        <i class="fas fa-magic"></i>
                        <span>3. Khởi tạo (Init)</span>
                    </div>
                    <div class="image-container">
                        <img src="statics/vidu3.png" alt="Ví dụ Khởi tạo" />
                    </div>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="nav-buttons">
            <button id="prevBtn" class="nav-btn"><i class="fas fa-chevron-left"></i> Trước</button>
            <button id="nextBtn" class="nav-btn">Tiếp <i class="fas fa-chevron-right"></i></button>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox-modal">
        <div class="lightbox-content">
            <span class="lightbox-close" onclick="closeLightbox()"><i class="fas fa-times"></i></span>
            <img id="lightbox-img" class="lightbox-image" src="" alt="Zoomed Image">
        </div>
    </div>

    <!-- Navigation Script -->
    <script>
        const slides = [
            "index.html", "slide1.html", "slide2.html", "slide3.html", "slide4.html",
            "slide5.html", "slide6.html", "slide7.html", "slide8.html", "slide9.html",
            "slide10.html", "slide11.html", "slide12.html", "slide13.html", "slide14.html"
        ];
        let currentFile = window.location.pathname.split('/').pop();
        if (!currentFile) currentFile = "index.html";
        let currentIndex = slides.indexOf(currentFile);

        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");

        if (currentIndex <= 0) prevBtn.disabled = true;
        if (currentIndex >= slides.length - 1 || currentIndex === -1) nextBtn.disabled = true;

        prevBtn.addEventListener("click", () => {
            if (currentIndex > 0) window.location.href = slides[currentIndex - 1];
        });

        nextBtn.addEventListener("click", () => {
            if (currentIndex > -1 && currentIndex < slides.length - 1) window.location.href = slides[currentIndex + 1];
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft" && currentIndex > 0) {
                window.location.href = slides[currentIndex - 1];
            } else if (e.key === "ArrowRight" && currentIndex > -1 && currentIndex < slides.length - 1) {
                window.location.href = slides[currentIndex + 1];
            }
        });

        function resizeSlide() {
            const container = document.querySelector('.slide-container');
            if (container) {
                const scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
                container.style.transform = `scale(${scale})`;
            }
        }
        window.addEventListener('resize', resizeSlide);
        resizeSlide();

        // Lightbox functionality
        function openLightbox(src) {
            const modal = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            modal.style.display = 'flex';
            // Trigger reflow
            void modal.offsetWidth;
            modal.classList.add('active');
        }

        function closeLightbox() {
            const modal = document.getElementById('lightbox');
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300); // Wait for transition
        }

        // Attach click events to images
        document.querySelectorAll('.image-container img').forEach(img => {
            img.addEventListener('click', () => openLightbox(img.src));
        });

        // Close when clicking outside the image
        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target.id === 'lightbox') {
                closeLightbox();
            }
        });

        // Close on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.getElementById('lightbox').classList.contains('active')) {
                closeLightbox();
            }
        });
    </script>
</body>

</html>
