<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Bối Cảnh</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&amp;family=Open+Sans:wght@400;600&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Open Sans', sans-serif;
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide-container {
            width: 1280px;
            height: 720px;
            display: flex;
            position: relative;
            background-color: #1e293b;
            color: white;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform-origin: center center;
        }

        /* Decorative Background Shapes (Solid colors, no gradients) */
        .shape-circle-1 {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 500px;
            height: 500px;
            background-color: #0f766e;
            /* Teal 700 */
            border-radius: 50%;
            z-index: 0;
        }

        .shape-circle-2 {
            position: absolute;
            bottom: -50px;
            left: -50px;
            width: 300px;
            height: 300px;
            background-color: #1e3a8a;
            /* Blue 900 */
            border-radius: 50%;
            z-index: 0;
        }

        .shape-rect {
            position: absolute;
            top: 20%;
            left: 45%;
            width: 600px;
            height: 400px;
            background-color: #2dd4bf;
            opacity: 0.1;
            transform: rotate(-5deg);
            border-radius: 30px;
            z-index: 0;
        }

        /* Content Areas */
        .content-wrapper {
            flex: 1;
            display: flex;
            z-index: 10;
            padding: 40px 60px;
            gap: 40px;
        }

        .left-col {
            flex: 1.1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .right-col {
            flex: 0.9;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Card Styling */
        .info-card {
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 16px 24px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            border-left: 8px solid #38bdf8;
            transition: transform 0.2s;
        }

        .info-card:hover {
            transform: translateX(6px);
            background-color: rgba(255, 255, 255, 0.08);
        }

        .info-card.python { border-left-color: #2dd4bf; }
        .info-card.micro  { border-left-color: #38bdf8; }
        .info-card.traffic{ border-left-color: #818cf8; }

        .icon-box {
            width: 52px;
            height: 52px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 20px;
            font-size: 22px;
            flex-shrink: 0;
        }

        .icon-box.python  { background-color: rgba(45, 212, 191, 0.2); color: #5eead4; }
        .icon-box.micro   { background-color: rgba(56, 189, 248, 0.2); color: #7dd3fc; }
        .icon-box.traffic { background-color: rgba(129, 140, 248, 0.2); color: #a78bfa; }

        /* Diagram Styling */
        .diagram-container {
            position: relative;
            width: 340px;
            height: 380px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .center-node {
            width: 120px;
            height: 120px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 3px solid #38bdf8;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.15);
        }

        .satellite-node {
            position: absolute;
            width: 90px;
            height: 90px;
            background-color: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border-radius: 18px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .node-top    { top: 0; border-bottom: 3px solid #2dd4bf; }
        .node-bottom { bottom: 0; border-top: 3px solid #818cf8; }

        .connector {
            position: absolute;
            background-color: rgba(255,255,255,0.15);
            z-index: 1;
        }

        .connector-v {
            width: 3px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
    <link rel="stylesheet" href="statics/nav-uniform.css">
</head>

<body>
    <div class="slide-container">
        <!-- Background Decorations -->
        <div class="shape-circle-1"></div>
        <div class="shape-circle-2"></div>
        <div class="shape-rect"></div>
        <!-- Main Content (full height flex row) -->
        <div class="content-wrapper">
            <!-- Left Column: Header + Cards -->
            <div class="left-col">
                <div class="mb-6">
                    <h1 class="font-montserrat font-bold text-6xl text-white tracking-tight leading-tight mb-2">
                        Bối cảnh
                    </h1>
                    <div class="flex items-center space-x-3">
                        <div class="h-1.5 w-16 bg-teal-400 rounded-full"></div>
                        <p class="font-open-sans text-base text-teal-300 font-medium tracking-widest uppercase">Yêu cầu hệ thống</p>
                    </div>
                </div>
                <!-- Card 1 -->
                <div class="info-card python">
                    <div class="icon-box python">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-montserrat font-bold text-xl text-white mb-1">Lưu lượng lớn</p>
                        <p class="font-open-sans text-sm text-slate-300">Hệ thống tiếp nhận và xử lý lượng dữ liệu khổng lồ mỗi giây.</p>
                    </div>
                </div>
                <!-- Card 2 -->
                <div class="info-card micro">
                    <div class="icon-box micro">
                        <i class="fas fa-bolt"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-montserrat font-bold text-xl text-white mb-1">Đa luồng</p>
                        <p class="font-open-sans text-sm text-slate-300">Xử lý song song nhiều kết nối khách hàng cùng lúc.</p>
                    </div>
                </div>
                <!-- Card 3 -->
                <div class="info-card traffic">
                    <div class="icon-box traffic">
                        <i class="fas fa-search"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-montserrat font-bold text-xl text-white mb-1">Truy xuất nhanh</p>
                        <p class="font-open-sans text-sm text-slate-300">Dữ liệu luôn sẵn sàng để phân tích và truy vấn tức thì.</p>
                    </div>
                </div>
            </div>
            <!-- Right Column: Visual Diagram -->
            <div class="right-col">
                <div class="diagram-container">
                    <!-- Connectors -->
                    <div class="connector connector-v"></div>
                    <!-- Top Node -->
                    <div class="satellite-node node-top">
                        <i class="fas fa-globe text-2xl text-blue-400 mb-1"></i>
                        <p class="font-bold text-xs text-slate-300">Lưu lượng</p>
                    </div>
                    <!-- Center Node -->
                    <div class="center-node">
                        <i class="fab fa-python text-4xl text-yellow-400 mb-1"></i>
                        <p class="font-bold text-sm text-slate-200">Backend</p>
                    </div>
                    <!-- Bottom Node -->
                    <div class="satellite-node node-bottom">
                        <i class="fas fa-database text-2xl text-emerald-400 mb-1"></i>
                        <p class="font-bold text-xs text-slate-300">ClickHouse</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation script and styling added automatically -->
    <style>
        .nav-buttons {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background-color: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            color: inherit;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn i {
            font-size: 14px;
        }

        .nav-btn:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Handle light background slides by darkening buttons slightly */
        .content-wrapper>.text-white,
        body[style*="f1f5f9"] .nav-btn,
        body[style*="f8fafc"] .nav-btn,
        .bg-slate-50 .nav-btn {
            background-color: rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.2);
            color: #1e293b;
        }

        .content-wrapper>.text-white:hover,
        body[style*="f1f5f9"] .nav-btn:hover,
        body[style*="f8fafc"] .nav-btn:hover,
        .bg-slate-50 .nav-btn:hover {
            background-color: rgba(0, 0, 0, 0.2);
        }
    </style>
    <div class="nav-buttons">
        <button id="prevBtn" class="nav-btn"><i class="fas fa-chevron-left"></i> Trước</button>
        <button id="nextBtn" class="nav-btn">Tiếp <i class="fas fa-chevron-right"></i></button>
    </div>
    <script>
        const slides = ["index.html", "slide1.html", "slide2.html", "slide3.html", "slide4.html", "slide5.html", "slide6.html", "slide7.html", "slide8.html", "slide9.html", "slide10.html", "slide12.html", "slide13.html", "slide14.html", "slide15.html"];
        let currentFile = window.location.pathname.split('/').pop();
        if (!currentFile) currentFile = "index.html";
        let currentIndex = slides.indexOf(currentFile);

        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");

        if (currentIndex <= 0) prevBtn.disabled = true;
        if (currentIndex >= slides.length - 1 || currentIndex === -1) nextBtn.disabled = true;

        prevBtn.addEventListener("click", () => {
            if (currentIndex > 0) window.location.href = slides[currentIndex - 1];
        });

        nextBtn.addEventListener("click", () => {
            if (currentIndex > -1 && currentIndex < slides.length - 1) window.location.href = slides[currentIndex + 1];
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft" && currentIndex > 0) {
                window.location.href = slides[currentIndex - 1];
            } else if (e.key === "ArrowRight" && currentIndex > -1 && currentIndex < slides.length - 1) {
                window.location.href = slides[currentIndex + 1];
            }
        });

        function resizeSlide() {
            const container = document.querySelector('.slide-container');
            if (container) {
                const scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
                container.style.transform = `scale(${scale})`;
            }
        }
        window.addEventListener('resize', resizeSlide);
        resizeSlide();
    </script>
    <script src="statics/nav-uniform.js"></script>
</body>

</html>
